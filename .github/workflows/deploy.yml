name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your default branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-modules-cache: 'npm'
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite builds to 'dist'. Change to 'build' if using Create React App.
          branch: gh-pages # This deploys the compiled code to a clean branch
